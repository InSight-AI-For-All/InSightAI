# yaml-language-server: $schema=https://render.com/schema/render.yaml.json

services:
  - type: web
    name: insight-ai-for-all
    runtime: node
    plan: starter
    region: ohio
    branch: main
    buildCommand: npm ci && npm run verify:production && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    maxShutdownDelaySeconds: 180
    autoDeployTrigger: checksPass
    domains:
      - insightaiforall.com
    envVars:
      - key: NODE_VERSION
        value: 22.23.1
      - key: NEXT_PUBLIC_APP_URL
        value: https://insightaiforall.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_CRON_SECRET
        sync: false
      - key: ALERT_WEBHOOK_URL
        sync: false
      - key: ALERT_WEBHOOK_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-nano
      - key: OPENAI_DEFAULT_FACT_CHECK_MODEL
        value: gpt-5.4-nano
      - key: OPENAI_CHEAP_CLASSIFIER_MODEL
        value: gpt-5-nano
      - key: OPENAI_WEB_SEARCH_MODEL
        value: gpt-5.4-nano
      - key: OPENAI_HIGH_RISK_MODEL
        value: gpt-5.4-mini
      - key: ENABLE_WEB_SEARCH
        value: "true"
      - key: ENABLE_MODEL_ROUTING
        value: "true"
      - key: MAX_FACT_CHECK_INPUT_CHARS
        value: "8000"
      - key: MAX_FACT_CHECK_OUTPUT_TOKENS
        value: "3000"
      - key: FACT_CHECK_CACHE_TTL_HOURS
        value: "168"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_STARTER_PRICE_ID
        sync: false
      - key: STRIPE_STARTER_399_PRICE_ID
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_MAX_PRICE_ID
        sync: false